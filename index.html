<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Darina Grekhova</title>

  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="images/favicon.png" type="image/png">

  <!-- Typography -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@300;400;500&display=swap" rel="stylesheet">

</head>

<body class="home-body">

  <!-- SIDEBAR -->
  <div id="sidebar-container"></div>

  <!-- HERO IMAGE -->
  <main class="home-hero">

    <img
      id="hero-image"
      src="images/home/fragment-1.jpg"
      alt="Painting fragment"
    >
<button class="hero-nav hero-prev" onclick="prevImage()">
  ←
</button>

<button class="hero-nav hero-next" onclick="nextImage()">
  →
</button>
    
  </main>

  <!-- SIDEBAR SCRIPT -->
  <script src="sidebar.js"></script>

  <!-- HOME SCRIPT -->
  <script>

    document.addEventListener("DOMContentLoaded", () => {
      loadSidebar();
    });

    /* ===================================== */
    /* HOME IMAGES */
    /* ===================================== */

    const images = [

      "images/home/fragment-1.jpg",
      "images/home/fragment-2.jpg",
      "images/home/fragment-3.jpg",
      "images/home/fragment-4.jpg",
      "images/home/fragment-5.jpg",
      "images/home/fragment-6.jpg",
      "images/home/fragment-7.jpg",
      "images/home/fragment-8.jpg",
      "images/home/fragment-9.jpg",
      "images/home/fragment-10.jpg",
      "images/home/fragment-11.jpg"
    ];

    let current = 0;

    const hero = document.getElementById("hero-image");

    /* ===================================== */
    /* NEXT IMAGE */
    /* ===================================== */

    function nextImage() {

      current = (current + 1) % images.length;

      hero.src = images[current];
    }

    /* ===================================== */
    /* PREVIOUS IMAGE */
    /* ===================================== */

    function prevImage() {

      current = (current - 1 + images.length) % images.length;

      hero.src = images[current];
    }

    /* ===================================== */
    /* CLICK NAVIGATION */
    /* ===================================== */

  

    /* ===================================== */
    /* KEYBOARD */
    /* ===================================== */

    document.addEventListener("keydown", (e) => {

      if (e.key === "ArrowRight") {
        nextImage();
      }

      if (e.key === "ArrowLeft") {
        prevImage();
      }

    });

    /* ===================================== */
    /* VERY SLOW AUTOPLAY */
    /* ===================================== */

    setInterval(() => {

      nextImage();

    }, 20000);

  </script>

</body>
</html>
