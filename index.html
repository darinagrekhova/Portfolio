<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Darina Grekhova</title>

  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="images/favicon.png" type="image/png">

  <!-- Typography -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@300;400;500&display=swap" rel="stylesheet">

</head>

<body class="home-body">

  <!-- SIDEBAR -->
  <div id="sidebar-container"></div>

  <!-- HERO IMAGE -->
  <main class="home-hero">

    <img
      id="hero-image"
      src="images/home/fragment-1.jpg"
      alt="Painting fragment"
    >

    <!-- NAVIGATION -->

    <button class="hero-nav hero-prev" onclick="prevImage(true)">
      ←
    </button>

    <button class="hero-nav hero-next" onclick="nextImage(true)">
      →
    </button>

  </main>

  <!-- SIDEBAR SCRIPT -->
  <script src="sidebar.js"></script>

  <!-- HOME SCRIPT -->
  <script>

    document.addEventListener("DOMContentLoaded", () => {
      loadSidebar();
    });

    /* ===================================== */
    /* HOME IMAGES */
    /* ===================================== */

    const images = [

      "images/home/fragment-1.jpg",
      "images/home/fragment-2.jpg",
      "images/home/fragment-3.jpg",
      "images/home/fragment-4.jpg",
      "images/home/fragment-5.jpg",
      "images/home/fragment-6.jpg",
      "images/home/fragment-7.jpg",
      "images/home/fragment-8.jpg",
      "images/home/fragment-9.jpg",
      "images/home/fragment-10.jpg",
      "images/home/fragment-11.jpg"

    ];

    let current = 0;

    const hero = document.getElementById("hero-image");

    /* ===================================== */
    /* NEXT IMAGE */
    /* ===================================== */

    function nextImage(manual = false) {

      current = (current + 1) % images.length;

      hero.src = images[current];

      if (manual) {
        resetAutoplay();
      }
    }

    /* ===================================== */
    /* PREVIOUS IMAGE */
    /* ===================================== */

    function prevImage(manual = false) {

      current = (current - 1 + images.length) % images.length;

      hero.src = images[current];

      if (manual) {
        resetAutoplay();
      }
    }

    /* ===================================== */
    /* KEYBOARD NAVIGATION */
    /* ===================================== */

    document.addEventListener("keydown", (e) => {

      if (e.key === "ArrowRight") {
        nextImage(true);
      }

      if (e.key === "ArrowLeft") {
        prevImage(true);
      }

    });

    /* ===================================== */
    /* SHOW NAV ON MOVE */
    /* ===================================== */

    const heroContainer = document.querySelector(".home-hero");

    let navTimeout;

    function showNav() {

      heroContainer.classList.add("show-nav");

      clearTimeout(navTimeout);

      navTimeout = setTimeout(() => {

        heroContainer.classList.remove("show-nav");

      }, 1200);
    }

    document.addEventListener("mousemove", showNav);

    document.addEventListener("touchstart", showNav);

    showNav();

    /* ===================================== */
    /* AUTOPLAY */
    /* ===================================== */

    let autoplay;

    /* START AUTOPLAY */

    function startAutoplay() {

      clearInterval(autoplay);

      autoplay = setInterval(() => {

        nextImage();

      }, 25000);
    }

    /* RESET AUTOPLAY AFTER MANUAL NAVIGATION */

    function resetAutoplay() {
      startAutoplay();
    }

    /* START */

    startAutoplay();

  </script>

</body>
</html>
