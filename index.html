<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Darina Grekhova</title>

  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="images/favicon.png" type="image/png">

  <!-- Typography -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@300;400;500&display=swap" rel="stylesheet">

</head>

<body class="home-body">

  <!-- SIDEBAR -->
  <div id="sidebar-container"></div>

  <!-- HERO IMAGE -->
  <main class="home-hero">

    <img
      id="hero-image"
      src="images/home/fragment-1.jpg"
      alt="Painting fragment"
    >

  </main>

  <!-- SIDEBAR -->
  <script src="sidebar.js"></script>

  <script>

    document.addEventListener("DOMContentLoaded", () => {
      loadSidebar();
    });

    /* ===================================== */
    /* HOME IMAGES */
    /* ===================================== */

    const images = [
      "images/home/fragment-1.jpg",
      "images/home/fragment-2.jpg",
      "images/home/fragment-3.jpg",
      "images/home/fragment-4.jpg",
      "images/home/fragment-5.jpg",
      "images/home/fragment-6.jpg",
      "images/home/fragment-7.jpg",
      "images/home/fragment-8.jpg",
      
    ];

    let current = 0;

    const hero = document.getElementById("hero-image");

    /* ===================================== */
    /* SHOW IMAGE */
    /* ===================================== */

    function showImage(index) {

      hero.classList.add("fade");

      setTimeout(() => {

        hero.src = images[index];

        hero.classList.remove("fade");

      }, 300);
    }

    /* ===================================== */
    /* NEXT / PREV */
    /* ===================================== */

    function nextImage() {
      current = (current + 1) % images.length;
      showImage(current);
    }

    function prevImage() {
      current = (current - 1 + images.length) % images.length;
      showImage(current);
    }

    /* ===================================== */
    /* CLICK NAVIGATION */
    /* ===================================== */

    document.addEventListener("click", (e) => {

      // ignore clicks on menu links
      if (e.target.closest("a")) return;

      const x = e.clientX;

      if (x > window.innerWidth / 2) {
        nextImage();
      } else {
        prevImage();
      }

    });

    /* ===================================== */
    /* AUTO TRANSITION */
    /* ===================================== */

    setInterval(() => {
      nextImage();
    }, 10000);

  </script>

</body>
</html>
