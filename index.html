<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Darina Grekhova</title>

  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="images/favicon.png" type="image/png">

  <link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@300;400;500&display=swap" rel="stylesheet">

</head>

<body class="home-body">

  <!-- SIDEBAR -->
  <div id="sidebar-container"></div>

  <!-- HERO -->
  <main class="home-hero">

    <img
      id="hero-image"
      alt="Painting fragment"
    >

    <!-- CLICK ZONES -->

    <div class="hero-click hero-left"></div>
    <div class="hero-click hero-right"></div>

  </main>

  <!-- SIDEBAR SCRIPT -->
  <script src="sidebar.js"></script>

  <!-- HOME SCRIPT -->
  <script>

    document.addEventListener("DOMContentLoaded", () => {
  loadSidebar();
});

/* ===================================== */
/* IMAGES */
/* ===================================== */

const desktopImages = [
  "images/home/fragment-1.jpg",
  "images/home/fragment-2.jpg",
  "images/home/fragment-3.jpg",
  "images/home/fragment-4.jpg",
  "images/home/fragment-5.jpg",
  "images/home/fragment-6.jpg",
  "images/home/fragment-7.jpg",
  "images/home/fragment-8.jpg",
  "images/home/fragment-9.jpg",
  "images/home/fragment-10.jpg",
  "images/home/fragment-11.jpg",
  "images/home/fragment-12.jpg"
];

const mobileImages = [
  "images/home/fragment-1-mobile.jpg",
  "images/home/fragment-2-mobile.jpg",
  "images/home/fragment-3-mobile.jpg",
  "images/home/fragment-4-mobile.jpg",
  "images/home/fragment-5-mobile.jpg",
  "images/home/fragment-6-mobile.jpg",
  "images/home/fragment-7-mobile.jpg",
  "images/home/fragment-8-mobile.jpg",
  "images/home/fragment-9-mobile.jpg",
  "images/home/fragment-10-mobile.jpg",
  "images/home/fragment-11-mobile.jpg",
  "images/home/fragment-12-mobile.jpg"
];

const isMobile = window.innerWidth <= 768;
const images = isMobile ? mobileImages : desktopImages;

let wasMobile = isMobile;

window.addEventListener("resize", () => {
  const nowMobile = window.innerWidth <= 768;
  if (nowMobile !== wasMobile) location.reload();
});

/* ===================================== */
/* STATE */
/* ===================================== */

let current = 0;
const hero = document.getElementById("hero-image");

hero.src = images[0];

/* ===================================== */
/* PRELOAD (next/prev buffer) */
/* ===================================== */

function preload(index) {
  const img = new Image();
  img.src = images[index];
}

function preloadAdjacent() {
  const next = (current + 1) % images.length;
  const prev = (current - 1 + images.length) % images.length;

  preload(next);
  preload(prev);
}

preloadAdjacent();

/* ===================================== */
/* TRANSITION LOCK (FIX 1) */
/* ===================================== */

let isTransitioning = false;

/* ===================================== */
/* NAVIGATION */
/* ===================================== */

function nextImage(manual = false) {
  if (isTransitioning) return;

  isTransitioning = true;

  current = (current + 1) % images.length;
  hero.src = images[current];

  preloadAdjacent();

  if (manual) resetAutoplay();

  setTimeout(() => {
    isTransitioning = false;
  }, 250);
}

function prevImage(manual = false) {
  if (isTransitioning) return;

  isTransitioning = true;

  current = (current - 1 + images.length) % images.length;
  hero.src = images[current];

  preloadAdjacent();

  if (manual) resetAutoplay();

  setTimeout(() => {
    isTransitioning = false;
  }, 250);
}

/* ===================================== */
/* KEYBOARD */
/* ===================================== */

document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight") nextImage(true);
  if (e.key === "ArrowLeft") prevImage(true);
});

/* ===================================== */
/* CLICK ZONES (DESKTOP + MOBILE) */
/* ===================================== */

const leftZone = document.querySelector(".hero-left");
const rightZone = document.querySelector(".hero-right");

leftZone.addEventListener("click", () => prevImage(true));
rightZone.addEventListener("click", () => nextImage(true));

/* ===================================== */
/* SWIPE SUPPORT (mobile gallery behavior) */
/* ===================================== */

let touchStartX = 0;
let touchEndX = 0;

hero.addEventListener("touchstart", (e) => {
  touchStartX = e.changedTouches[0].screenX;
});

hero.addEventListener("touchend", (e) => {
  touchEndX = e.changedTouches[0].screenX;

  const diff = touchStartX - touchEndX;

  // threshold (avoid accidental swipes)
  if (Math.abs(diff) < 40) return;

  if (diff > 0) {
    nextImage(true);
  } else {
    prevImage(true);
  }
});

/* ===================================== */
/* AUTOPLAY (FIX 2 + 3) */
/* ===================================== */

let autoplay;

function startAutoplay() {
  clearTimeout(autoplay);

  autoplay = setTimeout(function loop() {
    nextImage(false);
    autoplay = setTimeout(loop, 25000);
  }, 25000);
}

function resetAutoplay() {
  clearTimeout(autoplay);
  startAutoplay();
}

startAutoplay();

  </script>

</body>

</html>
```
