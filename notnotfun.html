<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>notnotfun — Darina Grekhova</title>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-B34ZQTM04E"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-B34ZQTM04E');
  </script>

  <!-- Google Fonts & CSS -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="shortcut icon" href="images/favicon.png" type="image/x-icon">

  <style>
    /* Локальные стили для галереи */
    .artwork-wrapper {
      margin: 40px auto;
      text-align: center;
    }

    .image-container {
      display: inline-block;
      text-align: left;
      vertical-align: top;
    }

    .artworks {
      display: block;
      width: 400px;
      height: auto;
      object-fit: contain;
      margin: 0 auto 10px auto;
    }

    .description {
      font-size: 14px;
      text-align: left;
      font-style: italic;
      color: #000;
    }
  </style>

  <script defer>
    // Toggle для подменю
    function toggleSubmenu(id) {
      const submenu = document.getElementById("submenu-" + id);
      if (submenu) {
        submenu.style.display = submenu.style.display === "flex" ? "none" : "flex";
      }
    }

    // Подгрузка sidebar.html
    document.addEventListener("DOMContentLoaded", () => {
      fetch("sidebar.html")
        .then(response => response.text())
        .then(data => {
          document.getElementById("sidebar-container").innerHTML = data;

          // Активный state для notnotfun
          const links = document.querySelectorAll('.sidebar a');
          links.forEach(link => {
            if (link.getAttribute('href') === 'notnotfun.html') {
              link.classList.add('active');
              // Если ссылка в подменю — раскрыть родительское меню
              const parentSubmenu = link.closest('.submenu');
              if (parentSubmenu) parentSubmenu.style.display = 'flex';
            }
          });
        })
        .catch(err => console.error("Error loading sidebar:", err));
    });
  </script>
</head>
<body>

  <!-- Sidebar подгружается сюда -->
  <div id="sidebar-container"></div>

  <!-- Контент -->
  <div class="content">

    <!-- 1 -->
    <div class="artwork-wrapper">
      <div class="image-container">
        <img src="images/nnf/1.jpg" alt="girl in a pool" class="artworks" />
        <div class="description">
          <p><em>girl in a pool</em><br>oil on canvas<br>30×40 cm</p>
        </div>
      </div>
    </div>

    <!-- 2 -->
    <div class="artwork-wrapper">
      <div class="image-container">
        <img src="images/nnf/fun-for-fun-sketch-2.jpg" alt="fun for fun sketch 2" class="artworks" />
        <div class="description">
          <p><em>fun for fun sketch 2</em><br>oil on paper<br>9×14 cm</p>
        </div>
      </div>
    </div>

    <!-- 3 -->
    <div class="artwork-wrapper">
      <div class="image-container">
        <img src="images/nnf/fun-for-fun-sketch-3.png" alt="fun for fun sketch 3" class="artworks" />
        <div class="description">
          <p><em>fun for fun sketch 3</em><br>oil on paper<br>9×14 cm</p>
        </div>
      </div>
    </div>

    <!-- 4 -->
    <div class="artwork-wrapper">
      <div class="image-container">
        <img src="images/nnf/fun-for-fun-sketch-4.png" alt="fun for fun sketch 4" class="artworks" />
        <div class="description">
          <p><em>fun for fun sketch 4</em><br>oil on paper<br>9×14 cm</p>
        </div>
      </div>
    </div>

  </div>
</body>
</html>
