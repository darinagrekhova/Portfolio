<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Qui exspectat | Дарина Грехова</title>

  <!-- Fonts & Styles -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<!-- CONTENT -->
<div class="content">
  <div class="viewer">

    <!-- Навигационные стрелки -->
    <button class="nav prev" onclick="prevImage()">←</button>

    <img id="artwork" class="viewer-image" src="" alt="">

    <button class="nav next" onclick="nextImage()">→</button>

    <div class="viewer-caption" id="caption"></div>

  </div>
</div>

<script src="gallery.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

  // Инициализация галереи
  initGallery([
    {
      src: "images/qui-exspectat/лестница.jpg",
      title: "ladder",
      meta: "холст, масло<br>50×60 cm"
    },
    {
      src: "images/qui-exspectat/foreignerX.jpg",
      title: "quid agis",
      meta: "холст, масло<br>50×60 cm"
    }
  ]);

  // Инициализация функций
  initZoom();
  initSilentMode();
  initKeyboard();
  initSwipe();
  loadSidebar();

});
</script>

</body>
</html>
