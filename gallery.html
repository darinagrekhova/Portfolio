<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Gallery | Darina Grekhova</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant:wght@300;400;500&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="styles.css?v=20260715">
  <link rel="icon" href="images/favicon.png" type="image/png">

</head>

<body class="gallery-body">

  <!-- NAVIGATION -->
  <div id="sidebar-container"></div>

  <!-- GALLERY -->
  <main class="content content--viewer">

    <div class="viewer">

      <!-- ARTWORK -->
      <img
        id="artwork"
        class="viewer-image"
        src=""
        alt=""
        draggable="false"
      >

      <!-- CAPTION -->
      <div
        class="viewer-caption"
        id="caption"
        aria-live="polite"
      ></div>

      <!-- PREVIOUS / NEXT -->
      <div class="gallery-text-nav">

        <button
          class="gallery-previous"
          type="button"
        >
          previous
        </button>

        <button
          class="gallery-next"
          type="button"
        >
          next
        </button>

      </div>

    </div>

  </main>

  <!-- LIGHTBOX -->
  <div
    class="lightbox"
    id="lightbox"
    aria-hidden="true"
  >



    <img
      class="lightbox-image"
      id="lightbox-image"
      src=""
      alt=""
    >

  </div>

  <!-- SCRIPTS -->
  <script src="gallery-data.js"></script>
  <script src="gallery.js"></script>
  <script src="sidebar.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {

      loadSidebar();

      const params = new URLSearchParams(window.location.search);
      const seriesKey = params.get("series");
      const seriesData = SERIES[seriesKey];

      initGallery(seriesData);

    });
  </script>

</body>

</html>
