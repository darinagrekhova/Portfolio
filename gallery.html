<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gallery | Darina Grekhova</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="sidebar-container"></div>

<div class="content content--viewer">
  <div class="viewer">
    <div class="series-text" id="series-text"></div>

    <button class="nav prev" onclick="prevImage()">←</button>

    <img id="artwork" class="viewer-image" src="" alt="">

    <button class="nav next" onclick="nextImage()">→</button>

    <div class="viewer-caption" id="caption"></div>

  </div>
</div>

<script src="/gallery.js"></script>
<script src="/sidebar.js"></script>
  <script src="/gallery-data.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const params = new URLSearchParams(window.location.search);
  const series = params.get("series");

  initGallery(SERIES[series]);

  initKeyboard();
  initSwipe();

  loadSidebar();
});
</script>

</body>
</html>
