<html lang="en">

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact — Darina Grekhova</title>

  <!-- Стили и фавикон -->
  <link rel="stylesheet" href="styles.css" />
  <link rel="shortcut icon" href="images/favicon.png" type="image/x-icon">
  <link rel="icon" href="images/favicon.png" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant&display=swap" rel="stylesheet">

  <style>
    /* Только локальные стили контента contact (не трогаем sidebar) */
    .artwork-wrapper {
      margin: 40px auto;
      text-align: center;
    }
    .image-container {
      display: inline-block;
      text-align: center;
    }
    .contact-artwork {
      display: block;
      max-width: 400px;
      width: 100%;
      height: auto;
      object-fit: contain;
      margin: 20px auto 0 auto;
    }
    .description {
      font-size: 14px;
      text-align: center;
      font-style: italic;
      color: #000;
      margin: 0;
    }

    /* Переключатель языка */
    .language-switch {
      margin-top: 20px;
      font-size: 16px;
      display: flex;
      gap: 10px;
    }
    .language-switch a {
      text-decoration: none;
      color: #000;
    }
    .language-switch a:hover {
      color: #555;
    }
  </style>

  <script defer>
    function toggleSubmenu(id) {
      const submenu = document.getElementById("submenu-" + id);
      submenu.style.display = submenu.style.display === "flex" ? "none" : "flex";
    }
  </script>
</head>
<body>
   <!-- JS: подгрузка сайдбара -->
  <script>
    fetch('sidebar.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('sidebar-container').innerHTML = data;
      });

    // toggle для подменю
    function toggleSubmenu(id) {
      const submenu = document.getElementById('submenu-' + id);
      if (submenu) {
        submenu.style.display = (submenu.style.display === 'flex') ? 'none' : 'flex';
      }
    }
  </script>

  <!-- Content -->
  <div class="content">
    <div class="artwork-wrapper">
      <figure class="image-container">
        <figcaption class="description">
          <p><em>email: darinagrekhova@gmail.com</em><br>inst: @belfesprit</p>
        </figcaption>
        <img src="images/element_cv.jpg" alt="Artwork" class="contact-artwork" />
      </figure>
    </div>
  </div>
</body>
</html>
