<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Qui exspectat | Darina Grekhova</title>

  <!-- Google tag -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-B34ZQTM04E"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-B34ZQTM04E');
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<!-- CONTENT -->
<div class="content">
  <div class="viewer">

    <button class="nav prev" onclick="prevImage()">←</button>

    <img id="artwork" class="viewer-image" src="" alt="">

    <button class="nav next" onclick="nextImage()">→</button>

    <div class="viewer-caption" id="caption"></div>

  </div>
</div>



<script>

/* ===== SERIES ORDER ===== */
const seriesOrder = [
  "quiexspectat.html",
  "notnotfun.html",
  "foreigners.html",
  "slavic-myth-on-canvas.html",
  "slavic-myth-on-paper.html",
  "volante.html",
  "unknown-stories.html",
  "multifigures.html",
  "good-night.html"
];

/* ===== GALLERY ===== */
const gallery = [
  {
    src: "images/qui-exspectat/ladder.jpg",
    title: "ladder",
    meta: "oil on canvas<br>50×60 cm"
  },
  {
    src: "images/qui-exspectat/foreignerX.jpg",
    title: "quid agis",
    meta: "oil on canvas<br>50×60 cm"
  }
];

let current = 0;
let isAnimating = false;

/* ===== RENDER ===== */
function render() {
  document.getElementById("artwork").src = gallery[current].src;
  document.getElementById("caption").innerHTML =
    `<em>${gallery[current].title}</em><br>${gallery[current].meta}`;
}

/* ===== NAV ===== */
function nextImage() {
  if (isAnimating) return;
  isAnimating = true;

  const img = document.getElementById("artwork");
  img.classList.add("fade-out");

  setTimeout(() => {

    if (current === gallery.length - 1) {
      goToNextSeries();
      return;
    }

    current++;
    render();

    setTimeout(() => {
      img.classList.remove("fade-out");
      isAnimating = false;
    }, 100);

  }, 400);
}

function prevImage() {
  if (isAnimating || current === 0) return;

  isAnimating = true;
  const img = document.getElementById("artwork");

  img.classList.add("fade-out");

  setTimeout(() => {
    current--;
    render();

    setTimeout(() => {
      img.classList.remove("fade-out");
      isAnimating = false;
    }, 100);

  }, 400);
}

/* ===== NEXT SERIES ===== */
function getNextSeries() {
  const file = window.location.pathname.split("/").pop();
  const index = seriesOrder.indexOf(file);
  return seriesOrder[index + 1] || null;
}

function goToNextSeries() {
  const next = getNextSeries();
  if (!next) return;

 

  setTimeout(() => {
    window.location.href = next;
  }, 1000);
}

/* ===== SIDEBAR ===== */
fetch('/sidebar.html')
  .then(res => res.text())
  .then(data => {
    document.getElementById('sidebar-container').innerHTML = data;

    const file = window.location.pathname.split("/").pop();

    document.querySelectorAll('.menu-item a').forEach(link => {
      if (link.getAttribute('href') === file) {
        link.classList.add('active');
      }
    });
  });

function toggleSubmenu(id) {
  const submenu = document.getElementById('submenu-' + id);
  if (submenu) {
    submenu.style.display =
      submenu.style.display === 'flex' ? 'none' : 'flex';
  }
}

/* INIT */
render();

</script>

</body>
</html>
