<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Qui exspectat | Darina Grekhova</title>

  <!-- Google tag -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-B34ZQTM04E"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-B34ZQTM04E');
  </script>

  <!-- Шрифт и стили -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- Сайдбар -->
  <div id="sidebar-container"></div>

  <!-- Контент -->
  <div class="content">
    <div class="artwork-wrapper">
      <div class="image-container">
        <img src="images/qui-exspectat/ladder.jpg" alt="ladder" class="artworks">
        <div class="description">
          <p><em>ladder</em><br>oil on canvas<br>50×60 cm</p>
        </div>
      </div>
    </div>

    <div class="artwork-wrapper">
      <div class="image-container">
        <img src="images/qui-exspectat/foreignerX.jpg" alt="quid agis" class="artworks">
        <div class="description">
          <p><em>quid agis</em><br>oil on canvas<br>50×60 cm</p>
        </div>
      </div>
    </div>
  </div>

  <!-- JS -->
  <script>
    fetch('sidebar.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('sidebar-container').innerHTML = data;

        // 🔹 language switch
        const path = window.location.pathname;
        const file = path.substring(path.lastIndexOf('/') + 1);

        const langSwitch = document.querySelector('.language-switch');
        if (langSwitch) {
          langSwitch.innerHTML = `
            <a href="ru/${file}">ru</a>
            <a href="${file}">en</a>
          `;
        }

        // 🔹 active state (подсветка текущей страницы)
        const links = document.querySelectorAll('.menu-item a');
        links.forEach(link => {
          const href = link.getAttribute('href');
          if (href === file) {
            link.style.fontWeight = '600';
          }
        });
      });

    // 🔹 toggle submenu
    function toggleSubmenu(id) {
      const submenu = document.getElementById('submenu-' + id);
      if (submenu) {
        submenu.style.display =
          submenu.style.display === 'flex' ? 'none' : 'flex';
      }
    }
  </script>

</body>
</html>
