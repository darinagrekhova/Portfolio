<script>
document.addEventListener("DOMContentLoaded", () => {

  // 🔑 получаем серию из URL
  const params = new URLSearchParams(window.location.search);
  const series = params.get("series");

  // 🚨 fallback (если открыли volante.html напрямую)
  const currentSeries = series || "volante";

  // 🚀 инициализация галереи
  initGallery(SERIES[currentSeries]);

  // 🧠 функции
  initZoom();
  initKeyboard();
  initSwipe();

  // 📂 sidebar
  loadSidebar();

});
